{% extends "base.html" %}
{% block title %}O'qituvchilar — EduSoft{% endblock %}
{% block page_title %}O'qituvchilar{% endblock %}
{% block content %}
<style>
.teachers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.teachers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.teacher-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:.2s}
.teacher-card:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.teacher-card .teacher-avatar{width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.teacher-card h3{margin:0 0 4px;font-size:15px;font-weight:700}
.teacher-card .teacher-login{font-size:12px;color:var(--text3);margin-bottom:10px}
.teacher-card .teacher-courses{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.teacher-card .teacher-actions{display:flex;gap:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px}
.teacher-icon{width:48px;height:48px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--primary);margin-bottom:4px}
</style>

<div class="teachers-header">
  <div><h2 style="margin:0">O'qituvchilar</h2></div>
  <button class="btn btn-primary" onclick="openTeacherModal()"><i class="fas fa-plus"></i> Yangi o'qituvchi</button>
</div>

<div id="teachersContainer" class="teachers-grid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Yuklanmoqda...</div>
</div>

<div class="modal-overlay" id="teacherModal" style="display:none" onclick="if(event.target===this)closeTeacherModal()">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="teacher-icon"><i class="fas fa-chalkboard-user"></i></div>
        <div><h3 id="teacherModalTitle" style="margin:0">Yangi o'qituvchi</h3><small style="color:var(--text3);font-size:12px">O'qituvchi ma'lumotlarini kiriting</small></div>
      </div>
      <button class="modal-close" onclick="closeTeacherModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <div class="form-group">
          <label class="form-label">Ism *</label>
          <input class="form-control" id="t_name" placeholder="To'liq ismi">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-phone" style="color:var(--text3);margin-right:4px"></i>Telefon</label>
          <input class="form-control" id="t_phone" placeholder="+998 XX XXX XX XX">
        </div>
      </div>
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user" style="color:var(--text3);margin-right:4px"></i>Login *</label>
          <input class="form-control" id="t_login" placeholder="Login" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock" style="color:var(--text3);margin-right:4px"></i>Parol <span id="t_passLabel">*</span></label>
          <input class="form-control" id="t_password" type="text" placeholder="Parol" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-graduation-cap" style="color:var(--text3);margin-right:4px"></i>Biriktirilgan kurslar</label>
        <div id="t_courses" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTeacherModal()">Bekor qilish</button>
      <button class="btn btn-primary" id="t_saveBtn" onclick="saveTeacher()"><i class="fas fa-check"></i> Saqlash</button>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

let teachers = [];
let courses = [];
let editId = '';

async function loadTeachers() {
  courses = await api('/api/courses');
  const res = await api('/api/teachers');
  teachers = res || [];
  renderTeachers();
}

function renderTeachers() {
  const c = document.getElementById('teachersContainer');
  if (!teachers.length) {
    c.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)"><i class="fas fa-chalkboard-user" style="font-size:32px;display:block;margin-bottom:12px;opacity:.4"></i>Hozircha o\'qituvchilar yo\'q</div>';
    return;
  }
  c.innerHTML = teachers.map(t => `
    <div class="teacher-card">
      <div style="display:flex;gap:14px;margin-bottom:12px">
        <div class="teacher-avatar">${(t.name||'?')[0]}</div>
        <div>
          <h3>${esc(t.name)}</h3>
          <div class="teacher-login"><i class="fas fa-user"></i> ${esc(t.login)} ${t.phone ? `| <i class="fas fa-phone"></i> ${esc(t.phone)}` : ''}</div>
        </div>
      </div>
      <div class="teacher-courses">
        ${(t.course_ids||[]).map(cid => {
          const crs = courses.find(c => c.id === cid);
          return `<span class="badge badge-primary">${crs ? esc(crs.name) : cid}</span>`;
        }).join('')}
        ${(!t.course_ids || !t.course_ids.length) ? '<span class="badge badge-gray">Kurs biriktirilmagan</span>' : ''}
      </div>
      <div class="teacher-actions">
        <button class="btn btn-ghost btn-sm" onclick="editTeacher('${t.id}')"><i class="fas fa-pen"></i> Tahrirlash</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteTeacher('${t.id}')"><i class="fas fa-trash"></i> O'chirish</button>
      </div>
    </div>
  `).join('');
}

function openTeacherModal(data) {
  editId = data?.id || '';
  document.getElementById('teacherModalTitle').textContent = editId ? 'O\'qituvchini tahrirlash' : 'Yangi o\'qituvchi';
  document.getElementById('t_name').value = data?.name || '';
  document.getElementById('t_phone').value = data?.phone || '';
  document.getElementById('t_login').value = data?.login || '';
  document.getElementById('t_password').value = '';
  document.getElementById('t_passLabel').textContent = editId ? '(agar o\'zgartirmoqchi bo\'lsangiz)' : '*';
  document.getElementById('teacherModal').style.display = 'flex';
  renderCourseCheckboxes(data?.course_ids || []);
}

function closeTeacherModal() {
  document.getElementById('teacherModal').style.display = 'none';
  editId = '';
}

function editTeacher(id) {
  const t = teachers.find(x => x.id === id);
  if (t) openTeacherModal(t);
}

function renderCourseCheckboxes(selected) {
  const container = document.getElementById('t_courses');
  if (!courses.length) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px">Avval kurs yarating</div>';
    return;
  }
  container.innerHTML = courses.filter(c => c.status === 'active').map(c => `
    <label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px">
      <input type="checkbox" value="${c.id}" ${(selected||[]).includes(c.id)?'checked':''} style="accent-color:var(--primary);width:16px;height:16px">
      ${esc(c.name)}
    </label>
  `).join('');
}

function getSelectedCourses() {
  return [...document.querySelectorAll('#t_courses input[type=checkbox]:checked')].map(el => el.value);
}

async function saveTeacher() {
  const name = document.getElementById('t_name').value.trim();
  const login = document.getElementById('t_login').value.trim();
  const password = document.getElementById('t_password').value;
  if (!name) return toast('Ismni kiriting', 'error');
  if (!login) return toast('Loginni kiriting', 'error');
  if (!editId && !password) return toast('Parolni kiriting', 'error');

  const body = {
    name,
    phone: document.getElementById('t_phone').value.trim(),
    login,
    course_ids: getSelectedCourses()
  };
  if (password) body.password = password;

  let res;
  if (editId) {
    res = await api(`/api/teachers/${editId}`, 'PUT', body);
  } else {
    res = await api('/api/teachers', 'POST', body);
  }
  if (res?.success) {
    toast(editId ? 'O\'qituvchi tahrirlandi' : 'O\'qituvchi qo\'shildi', 'success');
    closeTeacherModal();
    loadTeachers();
  } else {
    toast(res?.message || 'Xatolik', 'error');
  }
}

async function deleteTeacher(id) {
  if (!confirm('O\'qituvchini o\'chirishni tasdiqlaysizmi?')) return;
  const res = await api(`/api/teachers/${id}`, 'DELETE');
  if (res?.success) {
    toast('O\'qituvchi o\'chirildi', 'success');
    loadTeachers();
  }
}

loadTeachers();
</script>
{% endblock %}
