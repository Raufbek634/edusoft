<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="e7GKD7FBqxsXPyXCuOKUOK7W2wpStL_lU4VB3xjPdwY">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ _('kg_register') }}</title>
<meta name="description" content="O'quv markazingizni EduSoft tizimiga qo'shing. 30 kun bepul sinov muddati bilan o'quv markaz boshqaruv tizimidan foydalanishni boshlang.">
<meta name="keywords" content="EduSoft, o'quv markaz qo'shish, o'quv markaz ro'yxati, o'quv markaz boshqaruvi tizimi, o'quv markaz ochish">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/css/login.css">
<style>
body.login-body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;overflow:auto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8)}
.login-bg,.login-kids{display:block}
.login-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.login-orb{position:absolute;width:500px;height:500px;border-radius:50%;opacity:.15;filter:blur(80px)}
.login-orb-1{top:-150px;right:-100px;background:#111}
.login-orb-2{bottom:-200px;left:-150px;background:#4f46e5}
.login-orb-3{top:40%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;background:radial-gradient(circle,#ddd,#fff)}
.reg-box{max-width:520px;width:100%;position:relative;z-index:1}
.reg-form{padding:20px 32px 32px}
.reg-form .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:500px){.reg-form .form-grid{grid-template-columns:1fr}}
.success-box{display:none;padding:16px;background:#ecfdf5;border-radius:12px;color:#047857;font-weight:700;text-align:center;margin:0 28px 20px;border:1px solid #a7f3d0}
.reg-form .form-group{margin-bottom:22px}
.reg-form .form-control{padding:14px 16px;font-size:15px;border-radius:10px}
.reg-form .form-label{font-size:12px;margin-bottom:6px}
.reg-form .btn-kirish{padding:14px;border-radius:10px;font-size:15px}
.login-kids{position:fixed;z-index:0;pointer-events:none;width:100%;height:100%;inset:0}
.kid{position:absolute;font-size:clamp(24px,4vw,48px);opacity:.08;animation:float 6s ease-in-out infinite}
.kid-1{top:8%;left:5%;animation-delay:0s}
.kid-2{top:12%;right:8%;animation-delay:1.5s}
.kid-3{bottom:15%;left:10%;animation-delay:3s}
.kid-4{bottom:20%;right:6%;animation-delay:4.5s}
.kid-5{top:45%;left:3%;animation-delay:2s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body class="login-body">
<div class="login-bg"><div class="login-orb login-orb-1"></div><div class="login-orb login-orb-2"></div><div class="login-orb login-orb-3"></div></div>
<div class="login-kids" aria-hidden="true"><span class="kid kid-1"><i class="fas fa-school"></i></span><span class="kid kid-2">✨</span><span class="kid kid-3"><i class="fas fa-book-open"></i></span><span class="kid kid-4"><i class="fas fa-palette"></i></span><span class="kid kid-5"><i class="fas fa-star"></i></span></div>

<div class="login-wrap reg-box">
  <div class="login-glass">
    <div class="login-hero">
      <div class="login-icon-ring"><i class="fas fa-school"></i></div>
      <h1>Yangi o'quv markaz</h1>
      <p>Tizimdan foydalanish uchun ariza qoldiring — admin tez orada bog'lanadi</p>
    </div>
    <div class="success-box" id="successBox"></div>
    <div class="error-msg" id="errorMsg" style="margin:0 32px 14px"></div>
    <form class="reg-form" id="kgForm" onsubmit="submitKg(event)">
      <div class="form-group"><label class="form-label">O'quv markaz nomi *</label>
        <input class="form-control" id="kg_name" required placeholder="Masalan: Yangi avlod"></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Rahbar ismi *</label>
          <input class="form-control" id="director" required></div>
        <div class="form-group"><label class="form-label">{{ _('phone') }} *</label>
          <input class="form-control" id="phone" type="tel" required placeholder="998901234567"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Shahar</label>
          <input class="form-control" id="city" placeholder="Toshkent"></div>
        <div class="form-group"><label class="form-label">Sig'im</label>
          <input class="form-control" id="capacity" placeholder="50 bola"></div>
      </div>
      <div class="form-group"><label class="form-label">Manzil</label>
        <input class="form-control" id="address"></div>
      <div class="form-group"><label class="form-label">Email</label>
        <input class="form-control" id="email" type="email"></div>
      <div class="form-group"><label class="form-label">{{ _('plan') }} tanlang *</label>
        <div id="planOptions" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
      <div class="form-group"><label class="form-label">{{ _('password') }} ({{ _('admin_login') }} uchun) *</label>
        <input class="form-control" id="password" type="password" required placeholder="Kamida 6 belgi"></div>
      <div class="form-group"><label class="form-label">Telegram Chat ID (ixtiyoriy)</label>
        <input class="form-control" id="owner_telegram" placeholder="@userinfobot dan"></div>
      <div class="form-group"><label class="form-label">Qo'shimcha</label>
        <textarea class="form-control" id="notes" rows="3"></textarea></div>
      <button type="submit" class="btn-kirish" id="submitBtn" style="margin-top:10px">{{ _('send') }} →</button>
    </form>
    <div class="login-links" style="padding:12px 32px 24px">
      <a href="/login" class="link-student">← {{ _('admin_login') }}</a>
    </div>
  </div>
</div>
<p class="login-credit"><strong>Raufbek Turaqulov</strong> tomonidan yaratilgan</p>
<script>
let selectedPlan = 'standard';
fetch('/api/platform/plans').then(r=>r.json()).then(plat => {
  const box = document.getElementById('planOptions');
  (plat.plans||[]).forEach(p => {
    const el = document.createElement('label');
    el.style.cssText = 'display:flex;gap:10px;padding:12px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;align-items:flex-start';
    el.innerHTML = `<input type="radio" name="plan" value="${p.id}" ${p.id==='standard'?'checked':''} style="margin-top:4px">
      <div><b>${p.name}</b> — 1 oy <b>bepul</b>, keyin <b>$${p.price_usd}/oy</b><br><small style="color:#64748b">${p.desc}</small></div>`;
    el.querySelector('input').onchange = e => { selectedPlan = e.target.value; };
    box.appendChild(el);
  });
});

async function submitKg(e) {
  e.preventDefault();
  const err = document.getElementById('errorMsg');
  const ok = document.getElementById('successBox');
  err.style.display = 'none'; ok.style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  const body = {
    kindergarten_name: document.getElementById('kg_name').value.trim(),
    director_name: document.getElementById('director').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    city: document.getElementById('city').value.trim(),
    address: document.getElementById('address').value.trim(),
    email: document.getElementById('email').value.trim(),
    capacity: document.getElementById('capacity').value.trim(),
    notes: document.getElementById('notes').value.trim(),
    plan: document.querySelector('input[name=plan]:checked')?.value || selectedPlan,
    owner_telegram: document.getElementById('owner_telegram').value.trim(),
    temp_password: document.getElementById('password').value
  };
  try {
    const res = await fetch('/api/bogcha-register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      ok.textContent = data.message;
      ok.style.display = 'block';
      document.getElementById('kgForm').reset();
    } else {
      err.textContent = data.message || '{{ _('error')|e }}';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Ulanish xatosi';
    err.style.display = 'block';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
